<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片对比工具</title>
    <link rel="stylesheet" href="../GlobalStyle.CSS">
    <style>
        .compare-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 40px;
            border: 1px solid #333333;
            border-radius: 8px;
            overflow: hidden;
            background-color: #1A1A1A;
        }
        
        .compare-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }
        
        .compare-wrapper.ratio-4-3 {
            padding-top: 75%;
        }
        
        .compare-wrapper.ratio-1-1 {
            padding-top: 100%;
        }
        
        .compare-images {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slider-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            width: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to left, transparent, rgba(255, 255, 255, 0.05), transparent);
            backdrop-filter: blur(2px);
            z-index: 5;
            pointer-events: none;
        }
        
        .compare-image {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #000;
        }
        
        .compare-slider {
            position: absolute;
            top: -50px;
            bottom: -50px;
            width: 2px;
            background-color: #76B900;
            left: 50%;
            transform: translateX(-50%);
            cursor: ew-resize;
            z-index: 10;
        }
        
        .compare-slider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #76B900;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
        
        .aspect-ratio-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .aspect-ratio-option {
            padding: 10px 20px;
            background-color: #222222;
            border: 1px solid #333333;
            border-radius: 4px;
            color: #B3B3B3;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .aspect-ratio-option.active {
            background-color: #76B900;
            color: #000000;
            border-color: #76B900;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片对比工具</h1>
        
        <div class="upload-section">
            <h2>上传图片</h2>
            <div class="option-group">
                <label for="leftImageUpload">左侧图片:</label>
                <input type="file" id="leftImageUpload" accept="image/*">
            </div>
            <div class="option-group">
                <label for="rightImageUpload">右侧图片:</label>
                <input type="file" id="rightImageUpload" accept="image/*">
            </div>
            <button id="loadBtn">加载图片</button>
            <div class="error-message" id="errorMessage"></div>
        </div>
        
        <div class="resize-section">
            <h2>宽高比设置</h2>
            <div class="aspect-ratio-options">
                <div class="aspect-ratio-option active" data-ratio="16-9">16:9</div>
                <div class="aspect-ratio-option" data-ratio="4-3">4:3</div>
                <div class="aspect-ratio-option" data-ratio="1-1">1:1</div>
            </div>
        </div>
        
        <div class="preview-section">
            <h2>图片对比</h2>
            <div class="compare-container">
                <div class="compare-wrapper" id="compareWrapper">
                    <div class="compare-images" id="compareImages">
                        <img class="compare-image left" id="leftImage" src="" alt="左侧图片">
                        <img class="compare-image right" id="rightImage" src="" alt="右侧图片">
                        <div class="slider-overlay" id="sliderOverlay"></div>
                        <div class="compare-slider" id="compareSlider"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let leftImage = null;
        let rightImage = null;
        let isDragging = false;
        let currentRatio = '16-9';
        let currentPosition = 50;
        
        function updateClipPath(position) {
            const compareImages = document.getElementById('compareImages');
            const leftImageEl = document.getElementById('leftImage');
            const rightImageEl = document.getElementById('rightImage');
            const compareSlider = document.getElementById('compareSlider');
            
            const rect = compareImages.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            
            // 计算裁剪路径的坐标（垂直切割线）
            const positionX = (position / 100) * width;
            
            // 左侧图片裁剪路径：从左上角到滑块顶部，再到滑块底部，最后到左下角
            const leftTopX = positionX;
            const leftTopY = 0;
            const leftBottomX = positionX;
            const leftBottomY = height;
            
            // 右侧图片裁剪路径：从滑块顶部到右上角，再到右下角，最后到滑块底部
            const rightTopX = positionX;
            const rightTopY = 0;
            const rightBottomX = positionX;
            const rightBottomY = height;
            
            // 设置裁剪路径
            leftImageEl.style.clipPath = `polygon(0 0, ${leftTopX}px ${leftTopY}px, ${leftBottomX}px ${leftBottomY}px, 0 ${height}px)`;
            rightImageEl.style.clipPath = `polygon(${rightTopX}px ${rightTopY}px, ${width}px 0, ${width}px ${height}px, ${rightBottomX}px ${rightBottomY}px)`;
            
            // 调整滑块位置，使其与鼠标位置完全对应
            compareSlider.style.left = `${position}%`;
            
            // 更新滑块叠加层位置
            const sliderOverlay = document.getElementById('sliderOverlay');
            sliderOverlay.style.left = `${position}%`;
        }
        
        document.getElementById('loadBtn').addEventListener('click', function() {
            const leftFileInput = document.getElementById('leftImageUpload');
            const rightFileInput = document.getElementById('rightImageUpload');
            
            if (leftFileInput.files.length === 0 || rightFileInput.files.length === 0) {
                showError('请上传两张图片');
                return;
            }
            
            const leftFile = leftFileInput.files[0];
            const rightFile = rightFileInput.files[0];
            
            if (!leftFile.type.startsWith('image/') || !rightFile.type.startsWith('image/')) {
                showError('请选择图片文件');
                return;
            }
            
            const leftReader = new FileReader();
            leftReader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    leftImage = img;
                    document.getElementById('leftImage').src = e.target.result;
                    showError('');
                    updateClipPath(currentPosition);
                };
                img.src = e.target.result;
            };
            leftReader.readAsDataURL(leftFile);
            
            const rightReader = new FileReader();
            rightReader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    rightImage = img;
                    document.getElementById('rightImage').src = e.target.result;
                    showError('');
                    updateClipPath(currentPosition);
                };
                img.src = e.target.result;
            };
            rightReader.readAsDataURL(rightFile);
        });
        
        document.querySelectorAll('.aspect-ratio-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.aspect-ratio-option').forEach(opt => {
                    opt.classList.remove('active');
                });
                this.classList.add('active');
                
                currentRatio = this.dataset.ratio;
                const compareWrapper = document.getElementById('compareWrapper');
                
                compareWrapper.classList.remove('ratio-4-3', 'ratio-1-1');
                
                if (currentRatio === '4-3') {
                    compareWrapper.classList.add('ratio-4-3');
                } else if (currentRatio === '1-1') {
                    compareWrapper.classList.add('ratio-1-1');
                }
                
                setTimeout(() => {
                    updateClipPath(currentPosition);
                }, 100);
            });
        });
        
        const compareSlider = document.getElementById('compareSlider');
        const compareImages = document.getElementById('compareImages');
        
        compareSlider.addEventListener('mousedown', function(e) {
            isDragging = true;
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            
            const rect = compareImages.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = (x / rect.width) * 100;
            
            const clampedPercentage = Math.max(0, Math.min(100, percentage));
            currentPosition = clampedPercentage;
            
            updateClipPath(currentPosition);
        });
        
        document.addEventListener('mouseup', function() {
            isDragging = false;
        });
        
        window.addEventListener('resize', function() {
            updateClipPath(currentPosition);
        });
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
        }
        
        updateClipPath(50);
    </script>
</body>
</html>
